<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Control Electoral SCZ 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:#f0f0f0;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ── TOP BAR ── */
#topbar{background:#1a1a2e;padding:0 12px;display:flex;align-items:center;gap:10px;height:52px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.35)}
#logo{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:0.3px;flex-shrink:0}
#logo span{color:#4fc3f7}

/* ── SEARCH ── */
#search-wrap{position:relative;flex:1;min-width:0}
#search-input{width:100%;height:34px;padding:0 34px 0 36px;border:none;border-radius:20px;font-size:13px;background:#2d2d4e;color:#fff;outline:none;-webkit-appearance:none}
#search-input::placeholder{color:#888}
#search-input:focus{background:#3a3a60}
#s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#888;pointer-events:none;font-size:14px}
#s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#aaa;cursor:pointer;font-size:18px;display:none;background:none;border:none;line-height:1;padding:2px}
#search-results{position:absolute;top:38px;left:0;right:0;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.2);max-height:60vh;overflow-y:auto;display:none;z-index:3000;-webkit-overflow-scrolling:touch}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;gap:10px;-webkit-tap-highlight-color:transparent}
.sr-item:active{background:#f0f0f0}
.sr-item:last-child{border-bottom:none}
.sr-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:12px;font-weight:600;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-sub{font-size:11px;color:#888;margin-top:1px}
.sr-right{text-align:right;flex-shrink:0}
.sr-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;white-space:nowrap}
.sr-pct{font-size:11px;font-weight:700;margin-top:2px}

/* ── FILTER PILLS — scroll horizontal en móvil ── */
#filter-bar{background:#111827;padding:6px 10px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#filter-bar::-webkit-scrollbar{display:none}
.pill{height:28px;padding:0 12px;border-radius:14px;border:1.5px solid transparent;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:transparent;color:#aaa;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:all 0.15s}
#p-all{border-color:#555;color:#ccc}
#p-all.active{background:#555;border-color:#555;color:#fff}
#p-crit{border-color:#c0392b;color:#e57368}
#p-crit.active{background:#c0392b;color:#fff}
#p-disp{border-color:#e67e22;color:#f0a060}
#p-disp.active{background:#e67e22;color:#fff}
#p-ajus{border-color:#d4ac0d;color:#e8c840}
#p-ajus.active{background:#d4ac0d;color:#fff}
#p-acep{border-color:#27ae60;color:#5dcc85}
#p-acep.active{background:#27ae60;color:#fff}

/* ── MAP ── */
#map{flex:1;min-height:0;z-index:1}

/* ── BOTTOM STATS ── */
#panel{background:#1a1a2e;padding:6px 12px 8px;flex-shrink:0}
#stats-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:3px}
.stat{display:flex;align-items:center;gap:4px;font-size:10px}
.stat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.stat-lbl{color:#888}
.stat-val{color:#fff;font-weight:700}
#totals{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:#888}
#totals b{color:#e0e0e0}
#t-show{color:#4fc3f7;font-weight:700}

/* ── POPUP (bottom sheet en móvil) ── */
#popup{
  position:fixed;
  bottom:0; left:0; right:0;
  z-index:2000;
  background:#fff;
  border-radius:20px 20px 0 0;
  padding:0 0 env(safe-area-inset-bottom,8px);
  display:none;
  box-shadow:0 -4px 30px rgba(0,0,0,0.2);
  max-height:80vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  transform:translateY(0);
}
/* handle */
#popup::before{content:"";display:block;width:40px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 4px}
#popup-inner{padding:0 16px 16px}
#popup-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
#popup-title{font-size:14px;font-weight:700;color:#111;line-height:1.3;flex:1}
#popup-close{font-size:22px;cursor:pointer;background:none;border:none;color:#aaa;line-height:1;flex-shrink:0;padding:0 2px;-webkit-tap-highlight-color:transparent}
.popup-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;margin-bottom:8px}
.popup-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:12px;margin-bottom:8px}
.pg-k{color:#888;white-space:nowrap;align-self:center}
.pg-v{font-weight:600;color:#222;align-self:center}
.popup-section{font-size:11px;font-weight:700;color:#666;margin:10px 0 5px;padding-top:8px;border-top:1px solid #f0f0f0;text-transform:uppercase;letter-spacing:0.3px}
.popup-bar-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;font-weight:700}
.popup-bar{height:10px;background:#eee;border-radius:5px;overflow:hidden;margin-bottom:6px}
.popup-bar-fill{height:100%;border-radius:5px}
.popup-vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:12px;margin-bottom:8px}
.pv-k{color:#888;font-size:11px}
.pv-v{font-weight:700}
.gmaps-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:#4285F4;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;margin-top:6px;-webkit-tap-highlight-color:transparent;transition:background 0.15s}
.gmaps-btn:active{background:#3367d6}

/* ── OVERLAY ── */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1999;display:none}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
#loading p{color:#fff;font-size:16px;font-weight:600}
#loading small{color:#aaa;font-size:12px;text-align:center;padding:0 20px}
.spin{width:38px;height:38px;border:3px solid #333;border-top-color:#4fc3f7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DESKTOP overrides (>=640px) ── */
@media(min-width:640px){
  #topbar{height:52px;gap:12px}
  #logo{font-size:13px}
  #filter-bar{background:#0f172a;padding:5px 14px;gap:8px}
  .pill{height:30px;font-size:11px}
  #popup{
    bottom:auto; left:auto; right:16px; top:auto;
    bottom:120px;
    border-radius:14px;
    width:400px;
    max-height:70vh;
    box-shadow:0 6px 28px rgba(0,0,0,0.22);
    border:1px solid #eee;
    transform:none;
  }
  #popup::before{display:none}
  #overlay{display:none !important}
  .gmaps-btn{font-size:13px;padding:10px}
}

/* Tooltip */
.leaflet-tooltip{font-size:12px;font-weight:600;border-radius:7px;padding:5px 9px;pointer-events:none}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <p>Cargando mapa electoral</p>
  <small>365 recintos · Santa Cruz de la Sierra · 2da Vuelta 2026</small>
</div>
<div id="overlay"></div>

<div id="app">
  <div id="topbar">
    <div id="logo">Control <span>SCZ 2026</span></div>
    <div id="search-wrap">
      <span id="s-icon">&#9906;</span>
      <input id="search-input" type="text" placeholder="Buscar recinto..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button id="s-clear">&#215;</button>
      <div id="search-results"></div>
    </div>
  </div>

  <div id="filter-bar">
    <button class="pill active" id="p-all"  data-filter="all">Todos (365)</button>
    <button class="pill"        id="p-crit" data-filter="CRITICO">&#9679; Crítico (180)</button>
    <button class="pill"        id="p-disp" data-filter="EN DISPUTA">&#9679; En disputa (21)</button>
    <button class="pill"        id="p-ajus" data-filter="AJUSTADO">&#9679; Ajustado (7)</button>
    <button class="pill"        id="p-acep" data-filter="ACEPTABLE">&#9679; Aceptable (157)</button>
  </div>

  <div id="map"></div>

  <div id="panel">
    <div id="stats-row">
      <div class="stat"><div class="stat-dot" style="background:#c0392b"></div><span class="stat-lbl">Crítico:</span><span class="stat-val" id="cnt-c">180</span></div>
      <div class="stat"><div class="stat-dot" style="background:#e67e22"></div><span class="stat-lbl">Disputa:</span><span class="stat-val" id="cnt-d">21</span></div>
      <div class="stat"><div class="stat-dot" style="background:#d4ac0d"></div><span class="stat-lbl">Ajust:</span><span class="stat-val" id="cnt-a">7</span></div>
      <div class="stat"><div class="stat-dot" style="background:#27ae60"></div><span class="stat-lbl">Acep:</span><span class="stat-val" id="cnt-ok">157</span></div>
      <span style="color:#4fc3f7;font-size:10px;font-weight:700">Mostrando: <span id="t-show">365</span></span>
    </div>
    <div id="totals">
      <span>LIBRE 2v: <b id="t-l2">—</b></span>
      <span>SPT/OTTO 2v: <b id="t-s2">—</b></span>
      <span>Ventaja: <b id="t-mg">—</b></span>
      <span>Votos válidos: <b id="t-vv">—</b></span>
    </div>
  </div>
</div>

<!-- POPUP / BOTTOM SHEET -->
<div id="popup">
  <div id="popup-inner">
    <div id="popup-header">
      <div id="popup-title"></div>
      <button id="popup-close">&#215;</button>
    </div>
    <div id="popup-badge-wrap"></div>
    <div class="popup-grid" id="popup-grid"></div>
    <div id="popup-body"></div>
    <a id="gmaps-btn" class="gmaps-btn" target="_blank" rel="noopener noreferrer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Abrir en Google Maps
    </a>
  </div>
</div>

async function decompress(b64){
  const bin=atob(b64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream("gzip"),w=ds.writable.getWriter();
  w.write(bytes);w.close();
  const out=[],rd=ds.readable.getReader();
  while(true){const{done,value}=await rd.read();if(done)break;out.push(value);}
  const tot=out.reduce((a,b)=>a+b.length,0),m=new Uint8Array(tot);
  let o=0;for(const c of out){m.set(c,o);o+=c.length;}
  return JSON.parse(new TextDecoder().decode(m));
}

const CLR={
  CRITICO:     {fill:"#c0392b",ring:"#922b21",label:"CRÍTICO",     badge:"background:#fde8e8;color:#c0392b"},
  "EN DISPUTA":{fill:"#e67e22",ring:"#ca6f1e",label:"EN DISPUTA",  badge:"background:#fef5e7;color:#d35400"},
  AJUSTADO:    {fill:"#d4ac0d",ring:"#b7950b",label:"AJUSTADO",    badge:"background:#fefde7;color:#9a7d0a"},
  ACEPTABLE:   {fill:"#27ae60",ring:"#1e8449",label:"ACEPTABLE",   badge:"background:#e9f7ef;color:#1e8449"},
};

function fmt(n){return(+n).toLocaleString("es-BO")}
function pct(v,t){return t?((v/t)*100).toFixed(1)+"%":"—"}

function closePopup(){
  document.getElementById("popup").style.display="none";
  document.getElementById("overlay").style.display="none";
}
function openPopup(){
  document.getElementById("popup").style.display="block";
  // Only show overlay on mobile
  if(window.innerWidth<640)
    document.getElementById("overlay").style.display="block";
}

decompress(B64).then(D=>{
  document.getElementById("loading").style.display="none";

  function updateTotals(src){
    const tL=src.reduce((a,r)=>a+r.l2,0),tS=src.reduce((a,r)=>a+r.s2,0);
    const tVV=src.reduce((a,r)=>a+r.vv,0);
    const mg=tS-tL;
    document.getElementById("t-l2").textContent=fmt(tL)+" ("+pct(tL,tL+tS)+")";
    document.getElementById("t-s2").textContent=fmt(tS)+" ("+pct(tS,tL+tS)+")";
    const el=document.getElementById("t-mg");
    el.textContent=(mg>=0?"+":"")+fmt(mg);
    el.style.color=mg>=0?"#27ae60":"#c0392b";
    document.getElementById("t-vv").textContent=fmt(tVV);
    document.getElementById("t-show").textContent=src.length;
  }

  updateTotals(D);

  // Map
  const map=L.map("map",{zoomControl:true,preferCanvas:true,tap:true}).setView([-17.783,-63.182],12);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
    attribution:'&copy; OSM &copy; CARTO',subdomains:"abcd",maxZoom:19
  }).addTo(map);

  function fix(){map.invalidateSize({animate:false})}
  setTimeout(fix,150);setTimeout(fix,800);
  new ResizeObserver(fix).observe(document.getElementById("map"));

  const lg=L.layerGroup().addTo(map);
  let hlC=null, activeFilter="all";

  function render(filter){
    lg.clearLayers();
    const src=filter==="all"?D:D.filter(r=>r.cl===filter);
    src.forEach(r=>{
      const c=CLR[r.cl];
      const rd=5+Math.min((r.ins||0)/600*5,7);
      const ci=L.circleMarker([r.lat,r.lng],{
        radius:rd,color:c.ring,weight:1.2,
        fillColor:c.fill,fillOpacity:0.85
      });
      ci.on("click",(e)=>{
        L.DomEvent.stopPropagation(e);
        showPopup(r);
        map.panTo([r.lat,r.lng],{animate:true,duration:0.35});
      });
      ci.bindTooltip("<b>"+r.n+"</b><br><small>"+c.label+" · margen 2v: "+Math.abs(r.mg)+"</small>",{sticky:true,offset:[0,-4]});
      lg.addLayer(ci);
    });
    updateTotals(src);
  }

  render("all");

  // Filter pills
  document.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".pill").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter=btn.dataset.filter;
      closePopup();
      render(activeFilter);
    });
  });

  // POPUP
  function showPopup(r){
    const c=CLR[r.cl];
    const tot1=r.vv||1, tot2=r.l2+r.s2||1;
    const lp1=((r.l1/tot1)*100).toFixed(1);
    const sp1=((r.s1/tot1)*100).toFixed(1);
    const lp2=((r.l2/tot2)*100).toFixed(1);
    const sp2=((r.s2/tot2)*100).toFixed(1);
    const g2win=r.l2>=r.s2?"LIBRE":"SPT/OTTO";
    const g2color=r.l2>=r.s2?"#c0392b":"#1e8449";

    document.getElementById("popup-title").textContent=r.n;
    document.getElementById("popup-badge-wrap").innerHTML=
      '<span class="popup-badge" style="'+c.badge+'">'+c.label+'</span>';

    document.getElementById("popup-grid").innerHTML=
      '<span class="pg-k">Asiento</span><span class="pg-v">'+r.a+'</span>'+
      '<span class="pg-k">Inscritos</span><span class="pg-v">'+fmt(r.ins)+'</span>'+
      '<span class="pg-k">Participación</span><span class="pg-v">'+r.par+'%</span>';

    document.getElementById("popup-body").innerHTML=
      '<div class="popup-section">1ra vuelta</div>'+
      '<div class="popup-vote-grid">'+
        '<div><div class="pv-k" style="color:#c0392b">LIBRE</div><div class="pv-v" style="color:#c0392b">'+fmt(r.l1)+' ('+pct(r.l1,r.vv)+')</div></div>'+
        '<div><div class="pv-k" style="color:#5c0099">SPT</div><div class="pv-v" style="color:#5c0099">'+fmt(r.s1)+' ('+pct(r.s1,r.vv)+')</div></div>'+
        '<div><div class="pv-k" style="color:#1565c0">CREEMOS</div><div class="pv-v" style="color:#1565c0">'+fmt(r.c1)+' ('+pct(r.c1,r.vv)+')</div></div>'+
        '<div><div class="pv-k" style="color:#e67e22">DEMÓCRATAS</div><div class="pv-v" style="color:#e67e22">'+fmt(r.d1)+' ('+pct(r.d1,r.vv)+')</div></div>'+
        '<div><div class="pv-k">Partidos peq.</div><div class="pv-v">'+fmt(r.peq)+' → OTTO</div></div>'+
      '</div>'+
      '<div class="popup-bar-row"><span style="color:#c0392b">LIBRE '+lp1+'%</span><span style="color:#5c0099">SPT '+sp1+'%</span></div>'+
      '<div class="popup-bar"><div class="popup-bar-fill" style="width:'+lp1+'%;background:linear-gradient(90deg,#c0392b,#e74c3c)"></div></div>'+
      '<div class="popup-section">2da vuelta — Gana <span style="color:'+g2color+';font-weight:700">'+g2win+'</span> por '+Math.abs(r.mg)+' votos</div>'+
      '<div class="popup-bar-row"><span style="color:#c0392b">LIBRE '+lp2+'%</span><span style="color:#1e8449">SPT/OTTO '+sp2+'%</span></div>'+
      '<div class="popup-bar"><div class="popup-bar-fill" style="width:'+lp2+'%;background:'+(parseFloat(lp2)>=50?"linear-gradient(90deg,#c0392b,#e74c3c)":"linear-gradient(90deg,#1e8449,#27ae60)")+'"></div></div>';

    // Google Maps button
    document.getElementById("gmaps-btn").href=
      "https://www.google.com/maps/search/?api=1&query="+r.lat+","+r.lng;
    document.getElementById("gmaps-btn").onclick=()=>{
      setTimeout(closePopup, 300);
    };

    openPopup();
  }

  // Close popup
  document.getElementById("popup-close").onclick=closePopup;
  document.getElementById("overlay").onclick=closePopup;
  // Swipe down to close on mobile
  let touchStartY=0;
  document.getElementById("popup").addEventListener("touchstart",e=>{touchStartY=e.touches[0].clientY},{passive:true});
  document.getElementById("popup").addEventListener("touchmove",e=>{
    const dy=e.touches[0].clientY-touchStartY;
    if(dy>60) closePopup();
  },{passive:true});

  // Close popup AND search when clicking map background
  map.on("click",()=>{
    closePopup();
    document.getElementById("search-results").style.display="none";
  });

  // SEARCH
  const inp=document.getElementById("search-input");
  const resList=document.getElementById("search-results");
  const clearBtn=document.getElementById("s-clear");
  const idx=D.map(r=>({r,terms:(r.n+" "+r.a).toLowerCase()}));

  function score(terms,q){
    const ws=q.toLowerCase().split(/\s+/).filter(Boolean);
    let s=0;
    for(const w of ws){
      if(terms.startsWith(w))s+=3;
      else if(terms.includes(" "+w))s+=2;
      else if(terms.includes(w))s+=1;
      else return 0;
    }
    return s;
  }

  function showSearch(q){
    if(!q.trim()){resList.style.display="none";clearBtn.style.display="none";return;}
    clearBtn.style.display="block";
    const hits=idx.map(e=>({...e,sc:score(e.terms,q)})).filter(e=>e.sc>0).sort((a,b)=>b.sc-a.sc||a.r.n.length-b.r.n.length).slice(0,10);
    if(!hits.length){resList.style.display="none";return;}
    resList.innerHTML="";
    hits.forEach(({r})=>{
      const c=CLR[r.cl];
      const tot2=r.l2+r.s2||1;
      const lp2=((r.l2/tot2)*100).toFixed(1);
      const win=r.l2>=r.s2?"LIBRE ":"SPT ";
      const winColor=r.l2>=r.s2?"#c0392b":"#1e8449";
      const d=document.createElement("div");
      d.className="sr-item";
      d.innerHTML=
        '<div class="sr-dot" style="background:'+c.fill+'"></div>'+
        '<div class="sr-info"><div class="sr-name">'+r.n+'</div><div class="sr-sub">'+r.a+' · '+fmt(r.ins)+' inscritos · '+r.par+'%</div></div>'+
        '<div class="sr-right"><div class="sr-badge" style="'+c.badge+'">'+c.label+'</div><div class="sr-pct" style="color:'+winColor+'">'+win+lp2+'%</div></div>';
      d.addEventListener("click",()=>{
        inp.value=r.n;
        resList.style.display="none";
        inp.blur();
        map.setView([r.lat,r.lng],16,{animate:true});
        setTimeout(()=>map.invalidateSize(),50);
        if(hlC)map.removeLayer(hlC);
        hlC=L.circleMarker([r.lat,r.lng],{radius:28,color:"#f59e0b",weight:2.5,fillOpacity:0,dashArray:"7,4"}).addTo(map);
        setTimeout(()=>{if(hlC){map.removeLayer(hlC);hlC=null}},5000);
        showPopup(r);
      });
      resList.appendChild(d);
    });
    resList.style.display="block";
  }

  inp.addEventListener("input",e=>showSearch(e.target.value));
  inp.addEventListener("focus",e=>{if(e.target.value.length>=1)showSearch(e.target.value)});
  clearBtn.addEventListener("click",()=>{inp.value="";resList.style.display="none";clearBtn.style.display="none";inp.focus();});
  document.addEventListener("click",e=>{if(!document.getElementById("search-wrap").contains(e.target))resList.style.display="none";});

  // Keyboard nav in search
  inp.addEventListener("keydown",e=>{
    const items=[...resList.querySelectorAll(".sr-item")];
    const fi=items.findIndex(el=>el.classList.contains("focused"));
    if(e.key==="ArrowDown"){e.preventDefault();const ni=(fi+1)%items.length;items.forEach(el=>el.classList.remove("focused"));if(items[ni]){items[ni].classList.add("focused");items[ni].scrollIntoView({block:"nearest"});}}
    else if(e.key==="ArrowUp"){e.preventDefault();const ni=(fi-1+items.length)%items.length;items.forEach(el=>el.classList.remove("focused"));if(items[ni]){items[ni].classList.add("focused");items[ni].scrollIntoView({block:"nearest"});}}
    else if(e.key==="Enter"){const focused=resList.querySelector(".sr-item.focused");if(focused)focused.click();}
    else if(e.key==="Escape"){resList.style.display="none";inp.blur();}
  });

  const st=document.createElement("style");
  st.textContent=".sr-item.focused{background:#f0f7ff}";
  document.head.appendChild(st);

}).catch(e=>{
  document.getElementById("loading").innerHTML="<p style='color:#f66;font-size:14px;padding:20px'>Error: "+e.message+"</p>";
  console.error(e);
});
</script>
</body>
</html>
